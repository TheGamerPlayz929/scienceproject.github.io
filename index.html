<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHS Schedule</title>
  <meta name="description" content="Beautiful Shader Experiences - PHS Schedule">
  <link rel="icon" href="Icons8-Windows-8-Animals-Falcon.ico">
  <link rel="stylesheet" href="main.css">
</head>
<body>

<div class="ambient-canvas">
  <div class="ambient-orb ambient-orb--1"></div>
  <div class="ambient-orb ambient-orb--2"></div>
  <div class="ambient-orb ambient-orb--3"></div>
  <div class="ambient-noise"></div>
</div>

<div class="app-shell">
  <!-- Navigation -->
  <nav class="glass-nav fade-up" style="--stagger: 0">
    <div class="brand-icon">
      <a href="https://www.montgomeryschoolsmd.org/schools/poolesvillehs/" target="_blank" rel="noopener noreferrer">
        <img src="phs-logo.png" alt="PHS Logo" style="height: 40px; width: auto;">
      </a>
    </div>
    <div class="nav-links">
      <a href="announcements.html" class="nav-btn">Announcements</a>
      <a href="index.html" class="nav-btn active">Schedule</a>
      <a href="gradeviewer.html" class="nav-btn">Grades</a>
    </div>
    <div></div> <!-- Empty div for 3-column grid alignment -->
  </nav>

  <!-- Hero Section -->
  <main class="hero">
    <div class="status-badge fade-up" style="--stagger: 1" id="status-pill" data-status="off">
      <span class="status-dot"></span>
      <span id="status-label">Loading...</span>
    </div>

    <div class="hero-title-wrapper fade-up" style="--stagger: 2">
      <h2 class="hero-eyebrow" id="hero-eyebrow">Currently in</h2>
      <h1 class="hero-title" id="hero-title">—</h1>
    </div>

    <!-- Glass Countdown Panel -->
    <div class="ring-wrap fade-up" style="--stagger: 3">
      <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <path
          class="progress-ring__track"
          d="M 110 14
             A 96 96 0 1 0 110 206
             A 96 96 0 1 0 110 14"
          pathLength="100"
        />
        <path
          class="progress-ring__fill"
          id="ring-fill"
          d="M 110 14
             A 96 96 0 1 0 110 206
             A 96 96 0 1 0 110 14"
          pathLength="100"
        />
      </svg>
      <div class="glass-circle">
        <div class="countdown-wrapper" aria-live="polite">
          <div class="cd-main" id="cd-hm">0<span class="cd-min-label">m</span></div>
          <div class="cd-sub" id="cd-sub">
            <span class="cd-sec" id="cd-s">0</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Schedule Section -->
  <section class="schedule-section fade-up" style="--stagger: 4">
    <div class="schedule-header">
      <h3 id="schedule-title">Normal Schedule</h3>
      <span class="date" id="schedule-date"></span>
    </div>
    <ol class="period-list" id="period-list">
      <!-- JS renders period-card elements here -->
    </ol>
  </section>

  <footer class="app-footer fade-up" style="--stagger: 5">
    © Jayaditya & Emir / Poolesville High School / <a href="https://forms.gle/UrULj3gWiL9eqeif9" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Feedback Form</a>
  </footer>
</div>

<script src="main.js"></script>
</body>
</html>
