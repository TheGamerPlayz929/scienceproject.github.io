<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHS Schedule</title>
  <meta http-equiv="refresh" content="600">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="glass-overlay"></div>

  <header id="header" class="container py-5 text-center">
    <h1 class="display-4 fw-bold mb-4">PHS Schedule</h1>
    
    <div class="status-card mx-auto mb-4">
      <h2 class="h5 opacity-75 date">Today's Date: %ss</h2>
      <h2 class="h3 period">Current Period: <span class="badge bg-teal">%d</span></h2>
      <p class="mt-2 text-uppercase fw-semibold timeuntil">Time until %inf</p>
    </div>

    <div class="countdown countdown-container d-flex justify-content-center gap-2">
      <div class="time-box"><h3>%h</h3><span>Hours</span></div>
      <div class="time-box"><h3>%m</h3><span>Mins</span></div>
      <div class="time-box"><h3>%s</h3><span>Secs</span></div>
    </div>
  </header>

  <main class="container py-4 text-center">
    <section class="info-section mx-auto shadow-lg">
      <div class="p-4 border-bottom border-white border-opacity-10">
        <h3 class="h6 text-uppercase opacity-75">Schedule Type</h3>
        <p class="h4 text-teal fw-bold mb-0 stype">%a</p>
      </div>
      
      <div class="scheds px-3 py-4"></div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
