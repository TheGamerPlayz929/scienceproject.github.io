<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grades - PHS</title>
  <link rel="icon" href="Icons8-Windows-8-Animals-Falcon.ico">
  <link rel="stylesheet" href="main.css">
  <style>
    .grades-wrap {
      display: block;
      width: 100%;
      padding-bottom: 32px;
    }

    .grades-scaler {
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      max-width: 100vw;
      overflow: hidden;
      border-radius: 16px;
      background: transparent;
    }

    #grades-frame {
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<div class="ambient-canvas">
  <div class="ambient-orb ambient-orb--1"></div>
  <div class="ambient-orb ambient-orb--2"></div>
  <div class="ambient-orb ambient-orb--3"></div>
  <div class="ambient-noise"></div>
</div>

<div class="app-shell">
  <nav class="glass-nav fade-up" style="--stagger: 0">
    <div class="brand">
      <div class="brand-icon">
        <img src="phs-logo.png" alt="PHS Logo" style="height: 40px; width: auto;">
      </div>
    </div>
    <div class="nav-links">
      <a href="announcements.html" class="nav-btn">Announcements</a>
      <a href="index.html" class="nav-btn">Schedule</a>
      <a href="grademelon.html" class="nav-btn active">Grades</a>
    </div>
    <div></div>
  </nav>

  <main class="hero">
    <div class="hero-title-wrapper fade-up" style="--stagger: 1">
      <h1 class="hero-title" style="font-size: 56px;">Grades</h1>
    </div>
  </main>

  <section class="grades-wrap fade-up" id="grades-wrap" style="--stagger: 2">
    <div class="grades-scaler" id="grades-scaler">
      <iframe
        id="grades-frame"
        src="about:blank"
        scrolling="yes"
        allowtransparency="true"
        title="GradeMelon Grades"
        style="background: transparent;">
      </iframe>
    </div>
  </section>

  <footer class="app-footer fade-up" style="--stagger: 3">
    © Jayaditya & Emir / Poolesville High School <br>
    GradeMelon® is an independent application and is not affiliated with this project. Used with permission.
  </footer>
</div>

<script src="main.js"></script>
<script>
  const scaler = document.getElementById('grades-scaler');
  const frame  = document.getElementById('grades-frame');

  // Use local grademelon when running on localhost, otherwise use live Firebase URL
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  frame.src = isLocal ? 'http://localhost:3002/login' : 'https://schedulephs.web.app/login';

  let isFullscreen = false;
  const savedTransforms = [];

  function setSize() {
    if (isFullscreen) return;
    const h = Math.max(380, window.innerHeight - 440);
    frame.style.width  = scaler.offsetWidth + 'px';
    frame.style.height = h + 'px';
    scaler.style.height = h + 'px';
  }

  setSize();
  new ResizeObserver(setSize).observe(scaler);
  window.addEventListener('resize', setSize);

  function goFullscreen() {
    if (isFullscreen) return;
    isFullscreen = true;
    let el = frame.parentElement;
    while (el && el !== document.body) {
      savedTransforms.push({
        el,
        transform: el.style.transform,
        willChange: el.style.willChange,
        animation: el.style.animation,
        opacity: el.style.opacity,
      });
      el.style.transform = "none";
      el.style.willChange = "auto";
      el.style.animation = "none";
      el.style.opacity = "1";
      el = el.parentElement;
    }
    frame.style.position = "fixed";
    frame.style.top = "0";
    frame.style.left = "0";
    frame.style.width = "100vw";
    frame.style.height = "100vh";
    frame.style.zIndex = "99999";
    frame.style.borderRadius = "0";
  }

  function exitFullscreen() {
    if (!isFullscreen) return;
    isFullscreen = false;
    savedTransforms.forEach(s => {
      s.el.style.transform = s.transform;
      s.el.style.willChange = s.willChange;
      s.el.style.animation = s.animation;
      s.el.style.opacity = s.opacity;
    });
    savedTransforms.length = 0;
    frame.style.position = "";
    frame.style.top = "";
    frame.style.left = "";
    frame.style.zIndex = "";
    frame.style.borderRadius = "";
    setSize();
  }

  window.addEventListener("message", (e) => {
    if (!e.data) return;
    if (e.data.type === "modalOpen") goFullscreen();
    if (e.data.type === "modalClose") exitFullscreen();
  });
</script>
</body>
</html>
