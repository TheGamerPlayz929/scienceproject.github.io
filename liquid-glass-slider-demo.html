<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidGlassSlider Demo</title>
  <link rel="stylesheet" href="liquid-glass-slider.css">
</head>
<body class="liquid-slider-demo-page">
  <main class="liquid-slider-demo-shell">
    <section class="liquid-slider-demo-card" aria-labelledby="liquid-slider-demo-title">
      <div>
        <p class="liquid-slider-demo-kicker">Component preview</p>
        <h1 class="liquid-slider-demo-title" id="liquid-slider-demo-title">LiquidGlassSlider</h1>
        <p class="liquid-slider-demo-copy">Native range input semantics with a clear glass lens thumb, visible track, keyboard support, focus states, reduced motion support, and no image assets.</p>
      </div>

      <div
        data-liquid-glass-slider
        data-label="Liquid level"
        data-default-value="55"
        data-min="0"
        data-max="100"
        data-step="1"
        data-show-value="true"
        data-accent-color="#0a8fdc"
      ></div>
    </section>
  </main>

  <script src="liquid-glass-slider.js"></script>
</body>
</html>
