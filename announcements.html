<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements - PHS</title>
  <link rel="icon" data-bind="branding.favicon" data-bind-attr="href" href="Icons8-Windows-8-Animals-Falcon.ico">
  <link rel="stylesheet" href="main.css">
  <style>
    .announcements-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .announcement-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 24px 32px;
      transition: all 0.2s ease;
    }
    .announcement-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
    }
    .announcement-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--fg-1);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .announcement-content {
      color: var(--fg-2);
      font-size: 15px;
      line-height: 1.6;
    }
    .announcement-content ul, .announcement-content ol {
      margin-top: 12px;
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style-type: disc;
    }
    .announcement-content a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(168, 85, 247, 0.4);
      transition: all 0.2s;
    }
    .announcement-content a:hover { text-decoration-color: var(--accent); }
    .announcements-empty {
      color: var(--fg-2);
      text-align: center;
      padding: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="ambient-canvas">
  <div class="ambient-orb ambient-orb--1"></div>
  <div class="ambient-orb ambient-orb--2"></div>
  <div class="ambient-orb ambient-orb--3"></div>
  <div class="ambient-noise"></div>
</div>

<div class="app-shell">
  <nav class="glass-nav fade-up" style="--stagger: 0">
    <div class="brand">
      <div class="brand-icon">
        <a data-bind="branding.logoLink" data-bind-attr="href" href="https://www.montgomeryschoolsmd.org/schools/poolesvillehs/" target="_blank" rel="noopener noreferrer">
          <img data-bind="branding.logoSrc" data-bind-attr="src" src="phs-logo.png" alt="PHS Logo" style="height: 40px; width: auto;">
        </a>
      </div>
    </div>
    <div class="nav-links" id="nav-links" data-page="announcements"></div>
    <div></div>
  </nav>

  <main class="hero hero--compact">
    <div class="hero-title-wrapper fade-up" style="--stagger: 1">
      <h1 class="hero-title" style="font-size: 56px;" data-bind="hero.announcementsPageTitle">Announcements</h1>
    </div>
  </main>

  <section class="schedule-section fade-up" style="--stagger: 2">
    <div class="announcements-list" id="announcements-list">
      <div class="announcements-empty">Loading…</div>
    </div>
  </section>

  <footer class="app-footer fade-up" style="--stagger: 3">
    <span data-bind="footer.copyright">© Jayaditya & Emir / Poolesville High School</span> /
    <a data-bind="footer.feedbackUrl" data-bind-attr="href" href="https://forms.gle/UrULj3gWiL9eqeif9" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;"><span data-bind="footer.feedbackLabel">Feedback Form</span></a><br>
    <a data-bind="footer.supportEmail" data-bind-attr="mailto" href="mailto:supportphss@gmail.com" style="color:inherit;text-decoration:none;">✉ <span data-bind="footer.supportEmail">supportphss@gmail.com</span></a>
  </footer>
</div>

<script src="settings-loader.js"></script>
<script src="nav-renderer.js"></script>
<script src="privacy-analytics.js"></script>
<script src="google-analytics.js"></script>
<script>
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function renderAnnouncements(settings) {
    const list = document.getElementById('announcements-list');
    if (!list) return;
    const items = settings?.announcements?.items || [];
    if (!items.length) {
      list.innerHTML = '<div class="announcements-empty">No announcements yet.</div>';
      return;
    }
    list.innerHTML = items.map(a => {
      const bullets = (a.bullets || []).map(b => `<li>${escapeHtml(b)}</li>`).join('');
      return `<div class="announcement-card">
        <div class="announcement-title">${escapeHtml(a.title || '')}</div>
        <div class="announcement-content"><ul>${bullets}</ul></div>
      </div>`;
    }).join('');
  }
  document.addEventListener('site-settings:applied', e => renderAnnouncements(e.detail));
  if (window.__SITE_SETTINGS__) renderAnnouncements(window.__SITE_SETTINGS__);
</script>
<script src="main.js"></script>
<script src="appearance-settings.js"></script>
</body>
</html>
